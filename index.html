<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Идеальный круг</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07071a;
      --card: #12122a;
      --border: #2a2a5a;
      --accent: #6c63ff;
      --accent2: #a855f7;
      --text: #e8e8ff;
      --muted: #7070a0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      transition: opacity 0.3s, transform 0.3s;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96);
    }

    /* ── STARS BACKGROUND ── */
    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAME SCREEN ── */
    #nameScreen { z-index: 10; }

    /* ── HERO TITLE ── */
    .hero-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
      gap: 0;
    }

    /* "SIGMA" — huge, solid gradient fill */
    .hero-sigma {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 108px;
      line-height: 0.9;
      letter-spacing: 10px;
      background: linear-gradient(135deg, #c084fc 0%, #6c63ff 50%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 24px rgba(108,99,255,0.55))
              drop-shadow(0 0 60px rgba(168,85,247,0.25));
      user-select: none;
    }

    /* thin divider line under SIGMA */
    .hero-line {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #6c63ff, transparent);
      margin: 10px 0 8px;
      border-radius: 2px;
    }

    /* subtitle tagline */
    .hero-tagline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #7070a8;
      text-align: center;
      line-height: 1.45;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    input[type=text] {
      width: 100%;
      max-width: 280px;
      background: var(--card);
      border: 2px solid var(--border);
      color: var(--text);
      font-size: 16px;
      padding: 14px 18px;
      border-radius: 14px;
      outline: none;
      text-align: center;
      margin-bottom: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type=text]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.25);
    }
    input[type=text].shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      max-width: 280px;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.12s;
      margin-bottom: 10px;
    }
    .btn:active { transform: scale(0.96); opacity: 0.85; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .btn-secondary {
      background: var(--card);
      border: 2px solid var(--border);
      color: var(--text);
    }

    /* ── DRAW SCREEN ── */
    #drawScreen {
      z-index: 10;
      padding: 0;
      justify-content: flex-start;
    }

    #drawHeader {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      z-index: 20;
      pointer-events: none;
    }

    .player-badge {
      background: rgba(18,18,42,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
    }

    .hint-badge {
      background: rgba(18,18,42,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 13px;
      color: var(--muted);
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .draw-instruction {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(18,18,42,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 14px;
      color: var(--muted);
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.5s;
    }

    /* ── RESULT SCREEN ── */
    #resultScreen { z-index: 10; }

    .result-emoji {
      font-size: 60px;
      margin-bottom: 8px;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .score-ring {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 6px solid #6c63ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 10px auto 14px;
      position: relative;
      animation: popIn 0.5s 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    .score-ring::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: inherit;
      filter: blur(12px);
      opacity: 0.4;
    }

    .score-num {
      font-size: 52px;
      font-weight: 900;
      line-height: 1;
    }

    .score-outof {
      font-size: 13px;
      color: var(--muted);
    }

    .result-title {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 4px;
      animation: slideUp 0.4s 0.2s ease both;
    }

    .result-sub {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 22px;
      animation: slideUp 0.4s 0.3s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn-row {
      display: flex;
      gap: 10px;
      animation: slideUp 0.4s 0.4s ease both;
      width: 100%;
      max-width: 280px;
    }
    .btn-row .btn { margin-bottom: 0; flex: 1; }

    /* ── LEADERBOARD SCREEN ── */
    #lbScreen { z-index: 10; justify-content: flex-start; padding-top: 20px; }

    .lb-header {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 360px;
      margin-bottom: 14px;
    }

    .lb-back {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.12s;
    }
    .lb-back:active { transform: scale(0.92); }

    .lb-title {
      font-size: 20px;
      font-weight: 800;
    }

    .tabs {
      display: flex;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      width: 100%;
      max-width: 360px;
      margin-bottom: 14px;
    }

    .tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      color: var(--muted);
    }
    .tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    .lb-list {
      width: 100%;
      max-width: 360px;
      overflow-y: auto;
      flex: 1;
      padding-bottom: 20px;
    }

    .lb-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      animation: slideUp 0.3s ease both;
    }

    .lb-item.is-you {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .lb-rank {
      font-size: 20px;
      min-width: 32px;
      text-align: center;
    }

    .lb-info { flex: 1; min-width: 0; }

    .lb-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lb-date {
      font-size: 12px;
      color: var(--muted);
    }

    .lb-score {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── SCORE BREAKDOWN ── */
    .breakdown {
      width: 100%;
      max-width: 280px;
      margin-bottom: 16px;
      animation: slideUp 0.4s 0.25s ease both;
    }
    .subscore {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 13px;
    }
    .subscore-label {
      min-width: 96px;
      color: var(--muted);
    }
    .subscore-bar {
      flex: 1;
      height: 5px;
      background: #1e1e40;
      border-radius: 3px;
      overflow: hidden;
    }
    .subscore-fill {
      height: 100%;
      border-radius: 3px;
      width: 0%;
      transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .subscore-val {
      min-width: 28px;
      text-align: right;
      font-weight: 700;
      font-size: 12px;
    }

    /* ── SIGMA BADGE ── */
    .sigma-badge {
      margin-top: 22px;
      font-size: 12px;
      color: #3a3a6a;
      letter-spacing: 0.05em;
      text-align: center;
      font-weight: 500;
    }
    .sigma-badge span {
      color: #5a5a9a;
    }

    /* ── BACKGROUND ANIMATION CANVAS ── */
    #bgAnim {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .lb-empty {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 30px 20px;
    }

    .lb-spinner {
      text-align: center;
      padding: 30px;
      color: var(--muted);
      font-size: 14px;
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      top: -20px;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 100;
    }
    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- Stars -->
<canvas id="stars"></canvas>
<!-- Background circle doodles (name screen only) -->
<canvas id="bgAnim"></canvas>

<!-- ══════════════════════════════════
     SCREEN 1: Enter Name
══════════════════════════════════ -->
<div class="screen" id="nameScreen">
  <div class="hero-wrap">
    <div class="hero-sigma">SIGMA</div>
    <div class="hero-line"></div>
    <div class="hero-tagline">Нарисуй максимально<br>идеальный круг</div>
  </div>
  <input type="text" id="nameInput" placeholder="Введи своё имя" maxlength="20" autocomplete="off" />
  <button class="btn btn-primary" onclick="startDraw()">✏️ Нарисовать круг!</button>
  <button class="btn btn-secondary" onclick="openLeaderboard()">🏆 Таблица рекордов</button>
  <div class="sigma-badge">✦ <span>Sigma Circle Labs™</span> · результаты могут расстроить</div>
</div>

<!-- ══════════════════════════════════
     SCREEN 2: Draw
══════════════════════════════════ -->
<div class="screen hidden" id="drawScreen">
  <div id="drawHeader">
    <div class="player-badge" id="playerBadge">👤 …</div>
    <div class="hint-badge">Рисуй пальцем</div>
  </div>
  <canvas id="canvas"></canvas>
  <div class="draw-instruction" id="drawInstruction">☝️ Нарисуй окружность одним движением</div>
</div>

<!-- ══════════════════════════════════
     SCREEN 3: Result
══════════════════════════════════ -->
<div class="screen hidden" id="resultScreen">
  <div class="result-emoji" id="resEmoji">🎉</div>
  <div class="score-ring" id="scoreRing">
    <div class="score-num" id="scoreNum">0</div>
    <div class="score-outof">из 100</div>
  </div>
  <div class="breakdown" id="breakdown"></div>
  <div class="result-title" id="resTitle">Отлично!</div>
  <div class="result-sub" id="resSub">Неплохая рука!</div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="tryAgain()">🔄 Ещё раз</button>
    <button class="btn btn-primary" onclick="openLeaderboard()">🏆 Рекорды</button>
  </div>
</div>

<!-- ══════════════════════════════════
     SCREEN 4: Leaderboard
══════════════════════════════════ -->
<div class="screen hidden" id="lbScreen">
  <div class="lb-header">
    <button class="lb-back" onclick="closeLb()">←</button>
    <div class="lb-title">🏆 Рекорды</div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tabGlobal" onclick="switchTab('global')">🌍 Все игроки</div>
    <div class="tab" id="tabPersonal" onclick="switchTab('personal')">👤 Мои попытки</div>
  </div>
  <div class="lb-list" id="lbList"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// ⚙️  КОНФИГУРАЦИЯ — вставь сюда свои данные из Supabase
// ═══════════════════════════════════════════════════════════
const SUPABASE_URL      = 'https://krrursngclaoklfjmixf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_AI3gMECLOod0hLzzC_1n5w_qu1o5ays';
// ═══════════════════════════════════════════════════════════

// ── Telegram WebApp ──────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Supabase ─────────────────────────────────────────────
let sb = null;
if (SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
  try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}
}

// ── State ────────────────────────────────────────────────
let playerName  = '';
let lastScore   = 0;
let currentTab  = 'global';
let lbFrom      = 'result'; // where to go back

const personalScores = JSON.parse(localStorage.getItem('psc_v2') || '[]');

// ── Stars ────────────────────────────────────────────────
(function initStars() {
  const sc = document.getElementById('stars');
  const sctx = sc.getContext('2d');
  function resize() { sc.width = innerWidth; sc.height = innerHeight; drawStars(); }
  function drawStars() {
    sctx.clearRect(0,0,sc.width,sc.height);
    for (let i = 0; i < 120; i++) {
      const x = Math.random()*sc.width, y = Math.random()*sc.height;
      const r = Math.random()*1.5;
      sctx.beginPath(); sctx.arc(x,y,r,0,Math.PI*2);
      sctx.fillStyle = `rgba(200,200,255,${0.1+Math.random()*0.4})`;
      sctx.fill();
    }
  }
  window.addEventListener('resize', resize);
  resize();
})();

// ════════════════════════════════════════════════════════════
// ── Background circle doodles (name screen) ─────────────────
// ════════════════════════════════════════════════════════════
const bgCanvas = document.getElementById('bgAnim');
const bgCtx    = bgCanvas.getContext('2d');
let   bgOn     = false;
let   bgRafId  = null;
let   bgCircles = [];

// The "artists" — some famous, some not so much
const DOODLERS = [
  { name: 'CEO Sigma',         score:  4, color: '#f43f5e' },
  { name: 'Sigma AI v0.1',     score: 11, color: '#f97316' },
  { name: 'Инвестор раунда A', score: 17, color: '#eab308' },
  { name: 'Стажёр (1-й день)', score: 29, color: '#a78bfa' },
  { name: 'Дизайнер Sigma',    score: 64, color: '#c084fc' },
  { name: 'Sigma AI v2',       score: 91, color: '#38bdf8' },
  { name: 'Твой кот',          score:  8, color: '#fb923c' },
  { name: 'Продакт-менеджер',  score: 41, color: '#34d399' },
  { name: 'Главный по кругам', score: 99, color: '#6c63ff' },
];

function bgWonkyPath(cx, cy, r, quality) {
  // Use smooth Fourier harmonics instead of per-point random noise.
  // Each harmonic is a sine wave of a given frequency around the circle —
  // this creates organic, smooth deformations (ellipses, blobs, squished shapes)
  // rather than spiky noise.
  const N    = 120;
  const amp  = r * (1 - quality) * 0.42; // max deformation amplitude
  const numH = quality < 0.2 ? 4 : quality < 0.5 ? 3 : 2;

  // Pre-compute harmonics once (random phases & amplitudes fixed before the loop)
  const harmonics = [];
  for (let h = 0; h < numH; h++) {
    harmonics.push({
      freq:  2 + h,                                   // 2=ellipse, 3=trilobular, 4=square-ish
      amp:   amp * (1 / (h + 1)) * (0.6 + Math.random() * 0.8),
      phase: Math.random() * Math.PI * 2,
    });
  }

  return Array.from({ length: N + 1 }, (_, i) => {
    const a  = (i / N) * Math.PI * 2;
    let   nr = r;
    for (const h of harmonics) nr += h.amp * Math.sin(h.freq * a + h.phase);
    return { x: cx + Math.cos(a) * nr, y: cy + Math.sin(a) * nr };
  });
}

function bgSpawn() {
  if (!bgOn) return;
  const d   = DOODLERS[Math.floor(Math.random() * DOODLERS.length)];
  const pad = 90;
  const cx  = pad + Math.random() * (bgCanvas.width  - pad * 2);
  const cy  = pad + Math.random() * (bgCanvas.height - pad * 2);
  const r   = 32 + Math.random() * 52;
  bgCircles.push({
    pts:      bgWonkyPath(cx, cy, r, d.score / 100),
    cx, cy, r, d,
    progress: 0,
    alpha:    0,
    phase:    'fadein', // fadein → draw → show → fadeout
  });
  // Schedule next spawn
  setTimeout(bgSpawn, 1600 + Math.random() * 1400);
}

function bgRender() {
  if (!bgOn) return;
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

  bgCircles = bgCircles.filter(c => c.alpha > 0 || c.phase !== 'fadeout');

  for (const c of bgCircles) {
    // Phase transitions
    if (c.phase === 'fadein') {
      c.alpha = Math.min(c.alpha + 0.025, 0.45);
      if (c.alpha >= 0.45) c.phase = 'draw';
    } else if (c.phase === 'draw') {
      c.progress = Math.min(c.progress + 2.2, c.pts.length);
      if (c.progress >= c.pts.length) {
        c.phase = 'show';
        setTimeout(() => { c.phase = 'fadeout'; }, 1800);
      }
    } else if (c.phase === 'fadeout') {
      c.alpha = Math.max(c.alpha - 0.007, 0);
    }

    const n = Math.floor(c.progress);
    if (n < 2) continue;

    bgCtx.save();
    bgCtx.globalAlpha = c.alpha;

    // Stroke path
    bgCtx.strokeStyle = c.d.color;
    bgCtx.lineWidth   = 1.8;
    bgCtx.lineCap     = 'round';
    bgCtx.lineJoin    = 'round';
    bgCtx.shadowColor = c.d.color;
    bgCtx.shadowBlur  = 6;
    bgCtx.beginPath();
    bgCtx.moveTo(c.pts[0].x, c.pts[0].y);
    for (let i = 1; i < n; i++) bgCtx.lineTo(c.pts[i].x, c.pts[i].y);
    bgCtx.stroke();

    // Score label — appears after drawing finishes
    if (c.phase === 'show' || c.phase === 'fadeout') {
      const labelY = c.cy + c.r + 18;
      bgCtx.shadowBlur = 0;
      bgCtx.font       = 'bold 11px system-ui, sans-serif';
      bgCtx.textAlign  = 'center';
      bgCtx.fillStyle  = c.d.color;
      bgCtx.fillText(`${c.d.name}: ${c.d.score}/100`, c.cx, labelY);
    }
    bgCtx.restore();
  }

  bgRafId = requestAnimationFrame(bgRender);
}

function startBgAnim() {
  if (bgOn) return;
  bgOn = true;
  bgCanvas.width  = innerWidth;
  bgCanvas.height = innerHeight;
  bgCanvas.style.opacity = '1';
  bgCircles = [];
  bgSpawn(); bgSpawn(); // kick off two immediately
  bgRafId = requestAnimationFrame(bgRender);
}

function stopBgAnim() {
  bgOn = false;
  bgCanvas.style.opacity = '0';
  cancelAnimationFrame(bgRafId);
  setTimeout(() => { bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height); bgCircles=[]; }, 650);
}

// ── Screens ──────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  if (id === 'nameScreen') startBgAnim(); else stopBgAnim();
}

// Auto-start on load
startBgAnim();

// ── Name Screen ───────────────────────────────────────────
// Pre-fill from Telegram
if (tg?.initDataUnsafe?.user) {
  const u = tg.initDataUnsafe.user;
  document.getElementById('nameInput').value = (u.first_name + (u.last_name ? ' '+u.last_name : '')).slice(0,20);
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startDraw();
});

function startDraw() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) {
    const inp = document.getElementById('nameInput');
    inp.classList.add('shake');
    setTimeout(() => inp.classList.remove('shake'), 400);
    inp.focus();
    return;
  }
  playerName = name;
  document.getElementById('playerBadge').textContent = '👤 ' + name;
  show('drawScreen');
  // Wait two animation frames so the browser has fully laid out drawScreen
  // before we measure canvas size — otherwise getBoundingClientRect returns 0.
  requestAnimationFrame(() => requestAnimationFrame(() => setupCanvas()));
}

// ── Canvas / Drawing ──────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let drawing = false;
let pts     = [];
let canvasReady = false;
let _canvasEventsBound = false;   // FIX: module-level flag (not a property on a boolean)

function setupCanvas() {
  // Use offsetWidth/offsetHeight — these reflect the CSS layout size reliably
  // once the element is visible, unlike getBoundingClientRect which can return 0
  // if called before the first paint.
  const tg = window.Telegram?.WebApp;
  const w  = canvas.offsetWidth  || window.innerWidth;
  // On Telegram Mini App the viewport stable height is the safest height source.
  const h  = canvas.offsetHeight || (tg?.viewportStableHeight) || window.innerHeight;
  canvas.width  = Math.round(w);
  canvas.height = Math.round(h);
  canvasReady = true;
  resetCanvas();

  if (!_canvasEventsBound) {
    _canvasEventsBound = true;
    canvas.addEventListener('touchstart', onTS, {passive:false});
    canvas.addEventListener('touchmove',  onTM, {passive:false});
    canvas.addEventListener('touchend',   onTE, {passive:false});
    canvas.addEventListener('mousedown',  e => { const p = toCanvasPos(e.clientX, e.clientY); onStart(p.x, p.y); });
    canvas.addEventListener('mousemove',  e => { if(drawing) { const p = toCanvasPos(e.clientX, e.clientY); onMove(p.x, p.y); } });
    canvas.addEventListener('mouseup',    onEnd);
  }
}

function resetCanvas() {
  pts = []; drawing = false;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  document.getElementById('drawInstruction').style.opacity = '1';
}

// Convert viewport coords → canvas-local coords.
// Because canvas.width == canvas.offsetWidth (set in setupCanvas), the scale
// factor is exactly 1 — we only need to subtract the canvas's top-left position.
function toCanvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: clientX - rect.left,
    y: clientY - rect.top,
  };
}

function onTS(e) { e.preventDefault(); const p = toCanvasPos(e.touches[0].clientX, e.touches[0].clientY); onStart(p.x, p.y); }
function onTM(e) { e.preventDefault(); const p = toCanvasPos(e.touches[0].clientX, e.touches[0].clientY); onMove(p.x, p.y); }
function onTE(e) { e.preventDefault(); onEnd(); }

function onStart(x,y) {
  drawing = true;
  pts = [{x,y}];
  document.getElementById('drawInstruction').style.opacity = '0';
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function onMove(x,y) {
  if (!drawing) return;
  const prev = pts[pts.length-1];
  pts.push({x,y});
  // Rainbow glow trail
  const hue = (pts.length * 1.5) % 360;
  ctx.save();
  ctx.shadowColor = `hsl(${hue},90%,60%)`;
  ctx.shadowBlur  = 10;
  ctx.strokeStyle = `hsl(${hue},90%,70%)`;
  ctx.lineWidth   = 4;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(prev.x, prev.y);
  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.restore();
}

function onEnd() {
  if (!drawing) return;
  drawing = false;

  if (pts.length < 30) {
    document.getElementById('drawInstruction').style.opacity = '1';
    setTimeout(resetCanvas, 400);
    return;
  }

  const result = calcScore(pts);
  lastScore = result.total;

  // ── Visualize best-fit circle + deviation coloring ──────
  const circ = result._circle;
  if (circ) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Redraw stroke colored by per-point deviation (green=good, red=bad)
    for (let i = 1; i < pts.length; i++) {
      const dev = Math.abs(Math.hypot(pts[i].x - circ.cx, pts[i].y - circ.cy) - circ.r);
      const t   = Math.min(dev / (circ.r * 0.25), 1); // 0=good,1=bad
      const hue = Math.round(120 - t * 120);           // 120=green, 0=red
      ctx.save();
      ctx.strokeStyle = `hsl(${hue},90%,62%)`;
      ctx.shadowColor = `hsl(${hue},90%,50%)`;
      ctx.shadowBlur  = 8;
      ctx.lineWidth   = 4; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(pts[i-1].x, pts[i-1].y); ctx.lineTo(pts[i].x, pts[i].y);
      ctx.stroke(); ctx.restore();
    }

    // 2. Draw the ideal best-fit circle as a soft glow ring
    ctx.save();
    ctx.strokeStyle = 'rgba(180,220,255,0.35)';
    ctx.lineWidth   = 2;
    ctx.setLineDash([8, 7]);
    ctx.shadowColor = 'rgba(100,180,255,0.5)';
    ctx.shadowBlur  = 14;
    ctx.beginPath(); ctx.arc(circ.cx, circ.cy, circ.r, 0, Math.PI * 2);
    ctx.stroke(); ctx.restore();
  }

  // Short pause so the user sees the visual, then go to result
  setTimeout(() => {
    saveScore(result.total);
    showResult(result);
  }, 750);
}

// ════════════════════════════════════════════════════════════
// ── Circle Scoring  ─────────────────────────────────────────
// ════════════════════════════════════════════════════════════

/**
 * Resample a polyline to `n` uniformly-spaced points by arc length.
 * This eliminates touch-sampling-rate bias: slow segments produce many raw
 * points, fast segments produce few — resampling gives each part equal weight.
 */
function resampleByArcLength(pts, n) {
  const dists = [0];
  for (let i = 1; i < pts.length; i++) {
    dists.push(dists[i - 1] + Math.hypot(pts[i].x - pts[i - 1].x, pts[i].y - pts[i - 1].y));
  }
  const totalLen = dists[dists.length - 1];
  if (totalLen < 1) return pts;
  const result = [];
  let j = 0;
  for (let i = 0; i < n; i++) {
    const target = (i / (n - 1)) * totalLen;
    while (j < dists.length - 2 && dists[j + 1] < target) j++;
    const span = dists[j + 1] - dists[j];
    const t    = span > 0 ? (target - dists[j]) / span : 0;
    result.push({
      x: pts[j].x + t * (pts[j + 1].x - pts[j].x),
      y: pts[j].y + t * (pts[j + 1].y - pts[j].y),
    });
  }
  return result;
}

/**
 * Kasa least-squares circle fit.
 * Finds the circle that minimises the sum of squared algebraic distances.
 * Used for BOTH the visual overlay AND scoring — it finds the true geometric
 * centre regardless of point density along the stroke.
 */
function fitCircleKasa(pts) {
  const n = pts.length;
  let mx = 0, my = 0;
  for (const p of pts) { mx += p.x; my += p.y; }
  mx /= n; my /= n;

  let Suu=0, Svv=0, Suv=0, Suuu=0, Svvv=0, Suuv=0, Suvv=0;
  for (const p of pts) {
    const u = p.x - mx, v = p.y - my;
    Suu += u*u; Svv += v*v; Suv += u*v;
    Suuu += u*u*u; Svvv += v*v*v;
    Suuv += u*u*v; Suvv += u*v*v;
  }
  const denom = 2 * (Suu*Svv - Suv*Suv);
  if (Math.abs(denom) < 1e-8) return null;
  const uc = (Svv*(Suuu + Suvv) - Suv*(Suuv + Svvv)) / denom;
  const vc = (Suu*(Suuv + Svvv) - Suv*(Suuu + Suvv)) / denom;
  return { cx: uc + mx, cy: vc + my, r: Math.sqrt(uc*uc + vc*vc + (Suu + Svv) / n) };
}

/**
 * Coverage — what fraction of the full 360° is painted.
 * Penalises arcs, spirals, unclosed blobs.
 */
function scoreCoverage(pts, cx, cy) {
  const SECTORS = 72; // 5° each
  const filled  = new Set();
  for (const p of pts) {
    const a = Math.atan2(p.y - cy, p.x - cx);
    filled.add(Math.floor(((a + Math.PI) / (2 * Math.PI)) * SECTORS) % SECTORS);
  }
  return filled.size / SECTORS;
}

/**
 * MAIN SCORER  — v3 (Kasa-centre + arc-length resampling)
 *
 * Root causes of wrong scores that v2 had:
 *  • Centroid ≠ geometric centre: touch events fire at fixed time intervals,
 *    so wherever the user draws slowly there are more points; the centroid
 *    drifts there and every radius looks wrong.  Fix: use Kasa centre.
 *  • Device sampling-rate bias: 120 Hz ProMotion gives 3× more raw points
 *    than a 60 Hz device.  Fix: resample to 300 uniform arc-length steps.
 *  • ^1.5 power curve crushed good scores: raw 0.88 → 82 OK, but after
 *    centroid bias raw dropped to 0.70 → score only 59.  Fix: no power curve.
 *
 * New calibration:
 *   Great human circle  → CV ≈ 0.04 → score 85–93
 *   Decent circle       → CV ≈ 0.10 → score 65–72
 *   Oval / wobbly blob  → CV ≈ 0.20 → score 35–45
 *   Total mess          → CV ≈ 0.30 → score 10–20
 */
function calcScore(pts) {
  const n = pts.length;

  // ── Step 1: resample to 300 evenly-spaced points ──────────
  // Eliminates density bias from variable drawing speed / device Hz.
  const S  = resampleByArcLength(pts, Math.min(n, 300));
  const sn = S.length;

  // ── Step 2: Kasa least-squares circle fit ─────────────────
  // Finds the true geometric centre, regardless of point density.
  const kasa = fitCircleKasa(S);

  // Fallback to centroid if Kasa degenerates (nearly-collinear input)
  let cx, cy;
  if (kasa) {
    cx = kasa.cx; cy = kasa.cy;
  } else {
    cx = S.reduce((s, p) => s + p.x, 0) / sn;
    cy = S.reduce((s, p) => s + p.y, 0) / sn;
  }

  // ── Step 3: radii from Kasa centre ────────────────────────
  const radii = S.map(p => Math.hypot(p.x - cx, p.y - cy));
  const meanR = radii.reduce((s, r) => s + r, 0) / sn;
  if (meanR < 25) return { total: 0, roundness: 0, coverage: 0, closure: 0, _circle: null };

  const stdR = Math.sqrt(radii.reduce((s, r) => s + (r - meanR) ** 2, 0) / sn);
  const cv   = stdR / meanR; // 0 = perfect circle, higher = worse

  // ① Roundness (65 %): CV=0 → 1.0 | CV=0.10 → 0.55 | CV=0.22+ → 0
  const roundness = Math.max(0, 1 - cv * 4.5);

  // ② Coverage (20 %): fraction of full 360° that the stroke passes through
  const coverage = scoreCoverage(S, cx, cy);

  // ③ Closure (15 %): how close is the end of the stroke to the start
  const gap     = Math.hypot(pts[n - 1].x - pts[0].x, pts[n - 1].y - pts[0].y);
  const closure = Math.max(0, 1 - gap / (meanR * 2));

  // Weighted composite — no power curve, calibration handled by CV multiplier
  const raw   = roundness * 0.65 + coverage * 0.20 + closure * 0.15;
  const total = Math.max(0, Math.min(100, Math.round(raw * 100)));

  const circle = kasa || { cx, cy, r: meanR };
  return {
    total,
    roundness: Math.round(roundness * 100),
    coverage:  Math.round(coverage  * 100),
    closure:   Math.round(closure   * 100),
    _circle:   circle,
  };
}

// ── Result Screen ─────────────────────────────────────────
const REACTIONS = [
  { max:15,  e:'💀', t:'Это что вообще?!',        s:'Геометрия плачет' },
  { max:30,  e:'🥴', t:'Ну… стараешься!',         s:'Похоже на картошку' },
  { max:45,  e:'😂', t:'Смелая попытка!',         s:'Может, следующий будет лучше?' },
  { max:58,  e:'😅', t:'Почти яйцо',              s:'Но мы верим в тебя!' },
  { max:70,  e:'🙂', t:'Неплохо!',                s:'Твоя рука уже греется' },
  { max:80,  e:'😊', t:'Хорошо!',                 s:'Уверенная рука!' },
  { max:88,  e:'😎', t:'Очень хорошо!',           s:'Прирождённый художник' },
  { max:94,  e:'🤩', t:'Великолепно!',            s:'Почти идеально!' },
  { max:98,  e:'🔥', t:'Невероятно!',             s:'Ты серьёзно нарисовал это пальцем?!' },
  { max:100, e:'🎉', t:'ИДЕАЛЬНЫЙ КРУГ!!!',       s:'Срочно скриншот! Ты легенда!' },
];

function showResult(result) {
  const score = result.total;
  const rx = REACTIONS.find(x => score <= x.max) || REACTIONS[REACTIONS.length-1];

  document.getElementById('resEmoji').textContent = rx.e;
  document.getElementById('resTitle').textContent = rx.t;
  document.getElementById('resSub').textContent   = rx.s;

  // Color ring by score (red→yellow→green)
  const hue = Math.round(score * 1.2);
  const ring = document.getElementById('scoreRing');
  ring.style.borderColor = `hsl(${hue},80%,55%)`;
  ring.style.boxShadow   = `0 0 30px hsl(${hue},80%,35%), 0 0 0 1px hsl(${hue},60%,30%)`;

  show('resultScreen');

  // Animate main counter
  const el = document.getElementById('scoreNum');
  let cur = 0;
  const interval = setInterval(() => {
    cur = Math.min(cur + score / 50, score);
    el.textContent = Math.round(cur);
    if (cur >= score) clearInterval(interval);
  }, 16);

  // ── Subscore breakdown ───────────────────────────────────
  const subscores = [
    { label: '🎯 Форма',     val: result.roundness, tip: 'насколько все точки одинаково далеко от центра' },
    { label: '🔄 Полнота',   val: result.coverage,  tip: 'закрыл ли ты весь круг 360°' },
    { label: '🔒 Замыкание', val: result.closure,   tip: 'насколько близко начало и конец' },
  ];

  document.getElementById('breakdown').innerHTML = subscores.map(s => {
    const barHue = Math.round(s.val * 1.2);
    return `
      <div class="subscore" title="${s.tip}">
        <div class="subscore-label">${s.label}</div>
        <div class="subscore-bar">
          <div class="subscore-fill" style="width:0%;background:hsl(${barHue},80%,55%)" data-val="${s.val}"></div>
        </div>
        <div class="subscore-val" style="color:hsl(${barHue},80%,65%)">${s.val}</div>
      </div>`;
  }).join('');

  // Animate bars after brief delay
  setTimeout(() => {
    document.querySelectorAll('.subscore-fill').forEach(el => {
      el.style.width = el.dataset.val + '%';
    });
  }, 120);

  // Confetti for high scores (harder to get now)
  if (score >= 80) spawnConfetti(score >= 92 ? 80 : 40);

  // Haptic feedback
  if (tg?.HapticFeedback) {
    tg.HapticFeedback.notificationOccurred(score >= 80 ? 'success' : score >= 50 ? 'warning' : 'error');
  }
}

function tryAgain() {
  resetCanvas();
  show('drawScreen');
}

// ── Confetti ──────────────────────────────────────────────
function spawnConfetti(count) {
  const colors = ['#6c63ff','#a855f7','#f59e0b','#10b981','#38bdf8','#f43f5e'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random()*100 + 'vw';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.animationDuration = (1.5 + Math.random()*2) + 's';
      el.style.animationDelay = '0s';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}

// ── Save Score ────────────────────────────────────────────
async function saveScore(score) {
  // Personal (localStorage)
  personalScores.unshift({ name: playerName, score, date: new Date().toLocaleDateString('ru') });
  if (personalScores.length > 30) personalScores.length = 30;
  localStorage.setItem('psc_v2', JSON.stringify(personalScores));

  // Global (Supabase)
  if (!sb) return;
  try {
    const tgUser = tg?.initDataUnsafe?.user;
    await sb.from('scores').insert([{
      name: playerName,
      score,
      tg_user_id: tgUser?.id?.toString() || null,
    }]);
  } catch(e) { console.warn('Supabase insert error:', e); }
}

// ── Leaderboard ───────────────────────────────────────────
function openLeaderboard() {
  lbFrom = document.querySelector('.screen:not(.hidden)')?.id || 'nameScreen';
  currentTab = 'global';
  document.getElementById('tabGlobal').classList.add('active');
  document.getElementById('tabPersonal').classList.remove('active');
  show('lbScreen');
  loadLb('global');
}

function closeLb() {
  show(lbFrom === 'resultScreen' ? 'resultScreen' : 'nameScreen');
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabGlobal').classList.toggle('active', tab==='global');
  document.getElementById('tabPersonal').classList.toggle('active', tab==='personal');
  loadLb(tab);
}

async function loadLb(tab) {
  const list = document.getElementById('lbList');
  list.innerHTML = '<div class="lb-spinner">⏳ Загрузка…</div>';

  if (tab === 'personal') {
    renderPersonal();
    return;
  }

  if (!sb) {
    list.innerHTML = `<div class="lb-empty">
      ⚠️ База данных не подключена.<br><br>
      Добавь свои Supabase-ключи в код,<br>чтобы увидеть общий рейтинг!
    </div>`;
    return;
  }

  try {
    const { data, error } = await sb
      .from('scores')
      .select('name, score, created_at')
      .order('score', { ascending: false })
      .limit(25);
    if (error) throw error;
    renderGlobal(data || []);
  } catch(e) {
    list.innerHTML = `<div class="lb-empty">Ошибка загрузки: ${e.message}</div>`;
  }
}

const MEDALS = ['🥇','🥈','🥉'];

function renderGlobal(rows) {
  const list = document.getElementById('lbList');
  if (!rows.length) {
    list.innerHTML = '<div class="lb-empty">Пока никто не играл!<br>Будь первым! 🚀</div>';
    return;
  }
  list.innerHTML = rows.map((r,i) => `
    <div class="lb-item${r.name===playerName?' is-you':''}" style="animation-delay:${i*0.04}s">
      <div class="lb-rank">${MEDALS[i] || (i+1)}</div>
      <div class="lb-info">
        <div class="lb-name">${esc(r.name)}${r.name===playerName?' 👈 ты':''}</div>
        <div class="lb-date">${fmtDate(r.created_at)}</div>
      </div>
      <div class="lb-score">${r.score}</div>
    </div>
  `).join('');
}

function renderPersonal() {
  const list = document.getElementById('lbList');
  if (!personalScores.length) {
    list.innerHTML = '<div class="lb-empty">Ты ещё не рисовал круги!<br>Попробуй прямо сейчас 🎨</div>';
    return;
  }
  const sorted = [...personalScores].sort((a,b)=>b.score-a.score);
  list.innerHTML = sorted.map((r,i) => `
    <div class="lb-item" style="animation-delay:${i*0.04}s">
      <div class="lb-rank">${MEDALS[i] || (i+1)}</div>
      <div class="lb-info">
        <div class="lb-name">${esc(r.name)}</div>
        <div class="lb-date">${r.date || ''}</div>
      </div>
      <div class="lb-score">${r.score}</div>
    </div>
  `).join('');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('ru',{day:'numeric',month:'short'}); } catch { return ''; }
}
